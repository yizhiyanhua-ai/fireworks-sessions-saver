<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" width="960" height="480">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <marker id="arr-o" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f97316"/>
    </marker>
    <marker id="arr-p" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#a855f7"/>
    </marker>
    <marker id="arr-g" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#10b981"/>
    </marker>
    <marker id="arr-b" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
    </marker>
    <marker id="arr-y" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#eab308"/>
    </marker>
  </defs>

  <rect width="960" height="480" fill="url(#bg)" rx="12"/>

  <text x="480" y="36" fill="#e2e8f0" font-family="'SF Mono', 'Fira Code', monospace" font-size="15" text-anchor="middle" font-weight="bold">fireworks-sessions-saver  —  Components</text>
  <line x1="80" y1="50" x2="880" y2="50" stroke="#334155" stroke-width="1"/>

  <!-- ── Row 1: CLI Tools ── -->
  <text x="480" y="78" fill="#475569" font-family="'SF Mono', monospace" font-size="10" text-anchor="middle">CODING CLI TOOLS</text>

  <rect x="120" y="88" width="160" height="44" fill="#1e3a5f" rx="8" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="200" y="108" fill="#93c5fd" font-family="'SF Mono', monospace" font-size="11" text-anchor="middle" font-weight="bold">Claude Code</text>
  <text x="200" y="124" fill="#60a5fa" font-family="'SF Mono', monospace" font-size="9" text-anchor="middle">claude CLI</text>

  <rect x="400" y="88" width="160" height="44" fill="#1e3a5f" rx="8" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="480" y="108" fill="#93c5fd" font-family="'SF Mono', monospace" font-size="11" text-anchor="middle" font-weight="bold">Codex CLI</text>
  <text x="480" y="124" fill="#60a5fa" font-family="'SF Mono', monospace" font-size="9" text-anchor="middle">codex CLI</text>

  <rect x="680" y="88" width="160" height="44" fill="#1e293b" rx="8" stroke="#334155" stroke-width="1"/>
  <text x="760" y="108" fill="#64748b" font-family="'SF Mono', monospace" font-size="11" text-anchor="middle">Other CLI</text>
  <text x="760" y="124" fill="#475569" font-family="'SF Mono', monospace" font-size="9" text-anchor="middle">future support</text>

  <!-- Arrows down to hook layer -->
  <line x1="200" y1="132" x2="200" y2="168" stroke="#f97316" stroke-width="1.5" marker-end="url(#arr-o)"/>
  <line x1="480" y1="132" x2="480" y2="168" stroke="#f97316" stroke-width="1.5" marker-end="url(#arr-o)"/>

  <!-- ── Row 2: Hook Layer ── -->
  <text x="480" y="162" fill="#475569" font-family="'SF Mono', monospace" font-size="10" text-anchor="middle">HOOK LAYER  ·  settings.json</text>

  <rect x="80" y="172" width="800" height="52" fill="#1a0d00" rx="8" stroke="#f97316" stroke-width="1.5"/>
  <text x="480" y="192" fill="#fdba74" font-family="'SF Mono', monospace" font-size="10" text-anchor="middle" font-weight="bold">PostToolUse Hook  ·  matcher: Write|Edit|Bash</text>
  <text x="260" y="212" fill="#fb923c" font-family="'SF Mono', monospace" font-size="9" text-anchor="middle">heartbeat.py "$PWD"</text>
  <text x="480" y="212" fill="#94a3b8" font-family="'SF Mono', monospace" font-size="9" text-anchor="middle">async: true · never blocks</text>
  <text x="700" y="212" fill="#fb923c" font-family="'SF Mono', monospace" font-size="9" text-anchor="middle">&lt; 5ms · pure file I/O</text>

  <!-- Arrow down to scripts -->
  <line x1="480" y1="224" x2="480" y2="254" stroke="#f97316" stroke-width="1.5" marker-end="url(#arr-o)"/>

  <!-- ── Row 3: Scripts ── -->
  <text x="480" y="250" fill="#475569" font-family="'SF Mono', monospace" font-size="10" text-anchor="middle">SCRIPTS  ·  skill/scripts/</text>

  <!-- heartbeat -->
  <rect x="50" y="258" width="170" height="52" fill="#1a0d00" rx="8" stroke="#f97316" stroke-width="1.5"/>
  <text x="135" y="278" fill="#fdba74" font-family="'SF Mono', monospace" font-size="10" text-anchor="middle" font-weight="bold">heartbeat.py</text>
  <text x="135" y="294" fill="#fb923c" font-family="'SF Mono', monospace" font-size="8.5" text-anchor="middle">last_active · git files</text>
  <text x="135" y="306" fill="#92400e" font-family="'SF Mono', monospace" font-size="8" text-anchor="middle">auto via hook</text>

  <!-- save_session -->
  <rect x="240" y="258" width="170" height="52" fill="#1a0a2e" rx="8" stroke="#a855f7" stroke-width="1.5"/>
  <text x="325" y="278" fill="#d8b4fe" font-family="'SF Mono', monospace" font-size="10" text-anchor="middle" font-weight="bold">save_session.py</text>
  <text x="325" y="294" fill="#c084fc" font-family="'SF Mono', monospace" font-size="8.5" text-anchor="middle">init · checkpoint · cleanup</text>
  <text x="325" y="306" fill="#6b21a8" font-family="'SF Mono', monospace" font-size="8" text-anchor="middle">manual / skill trigger</text>

  <!-- list_sessions -->
  <rect x="430" y="258" width="170" height="52" fill="#0a1a0f" rx="8" stroke="#10b981" stroke-width="1.5"/>
  <text x="515" y="278" fill="#6ee7b7" font-family="'SF Mono', monospace" font-size="10" text-anchor="middle" font-weight="bold">list_sessions.py</text>
  <text x="515" y="294" fill="#34d399" font-family="'SF Mono', monospace" font-size="8.5" text-anchor="middle">scan · filter · rank</text>
  <text x="515" y="306" fill="#065f46" font-family="'SF Mono', monospace" font-size="8" text-anchor="middle">session start</text>

  <!-- restore_session -->
  <rect x="620" y="258" width="170" height="52" fill="#0f1a2e" rx="8" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="705" y="278" fill="#93c5fd" font-family="'SF Mono', monospace" font-size="10" text-anchor="middle" font-weight="bold">restore_session.py</text>
  <text x="705" y="294" fill="#60a5fa" font-family="'SF Mono', monospace" font-size="8.5" text-anchor="middle">load · format · print</text>
  <text x="705" y="306" fill="#1e3a5f" font-family="'SF Mono', monospace" font-size="8" text-anchor="middle">user selects</text>

  <!-- Arrows down to storage -->
  <line x1="135" y1="310" x2="200" y2="358" stroke="#eab308" stroke-width="1.5" marker-end="url(#arr-y)"/>
  <line x1="325" y1="310" x2="310" y2="358" stroke="#eab308" stroke-width="1.5" marker-end="url(#arr-y)"/>
  <line x1="515" y1="310" x2="480" y2="358" stroke="#eab308" stroke-width="1.5" marker-end="url(#arr-y)"/>
  <line x1="705" y1="310" x2="660" y2="358" stroke="#eab308" stroke-width="1.5" marker-end="url(#arr-y)"/>

  <!-- ── Row 4: Storage ── -->
  <text x="480" y="354" fill="#475569" font-family="'SF Mono', monospace" font-size="10" text-anchor="middle">STORAGE  ·  ~/.claude/sessions/</text>

  <rect x="80" y="362" width="360" height="52" fill="#1a1505" rx="8" stroke="#eab308" stroke-width="1.5"/>
  <text x="260" y="382" fill="#fde68a" font-family="'SF Mono', monospace" font-size="10" text-anchor="middle" font-weight="bold">active_{workdir_hash}.json</text>
  <text x="260" y="398" fill="#ca8a04" font-family="'SF Mono', monospace" font-size="8.5" text-anchor="middle">current session · rolling 10 checkpoints</text>
  <text x="260" y="410" fill="#92400e" font-family="'SF Mono', monospace" font-size="8" text-anchor="middle">paths only · no file content stored</text>

  <rect x="520" y="362" width="360" height="52" fill="#1e293b" rx="8" stroke="#475569" stroke-width="1.5"/>
  <text x="700" y="382" fill="#94a3b8" font-family="'SF Mono', monospace" font-size="10" text-anchor="middle" font-weight="bold">archive_{hash}_{ts}.json</text>
  <text x="700" y="398" fill="#64748b" font-family="'SF Mono', monospace" font-size="8.5" text-anchor="middle">awaiting restore · deleted after transfer</text>
  <text x="700" y="410" fill="#475569" font-family="'SF Mono', monospace" font-size="8" text-anchor="middle">7-day expiry · auto-cleanup</text>

  <!-- Bottom bar -->
  <rect x="30" y="428" width="900" height="30" fill="#0f172a" rx="8" stroke="#1e293b" stroke-width="1"/>
  <text x="480" y="447" fill="#475569" font-family="'SF Mono', monospace" font-size="9.5" text-anchor="middle">SKILL.md  ·  references/session-format.md  ·  references/log-discovery.md  ·  install.sh</text>
</svg>
